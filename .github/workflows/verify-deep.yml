name: Verify Deep

on:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build & Unit Test (${{ matrix.job.name }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: ubuntu-latest, name: Linux, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, name: macOS, target: aarch64-apple-darwin }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # `external/docker_credential` is the [patch.crates-io] source.
          submodules: recursive
      - name: Build
        uses: ./.github/actions/build-rust
        with:
          target: ${{ matrix.job.target }}
      - name: Install nextest
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-nextest
      - name: Test
        run: cargo nextest run --target=${{ matrix.job.target }} --profile ci --locked
      - name: Upload Test Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deep-unit-${{ matrix.job.name }}
          path: target/nextest/ci/junit.xml

  cross-compile:
    name: Cross-compile (${{ matrix.job.name }})
    runs-on: ubuntu-latest
    container:
      image: messense/cargo-xwin
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: Windows x64, target: x86_64-pc-windows-msvc }
          - { name: Windows ARM64, target: aarch64-pc-windows-msvc }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # `external/docker_credential` is the [patch.crates-io] source.
          submodules: recursive
      - name: Install Rust target
        run: rustup target add ${{ matrix.job.target }}
      - name: Build
        run: cargo xwin build --release --target=${{ matrix.job.target }} --locked
      - name: Prepare Binary
        run: cp target/${{ matrix.job.target }}/release/grim.exe grim-${{ matrix.job.target }}.exe
      - name: Upload grim Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grim-${{ matrix.job.target }}
          path: grim-${{ matrix.job.target }}.exe
          compression-level: 0
          retention-days: 7

  acceptance-tests:
    name: Acceptance (${{ matrix.job.name }})
    needs: [build, cross-compile]
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: ubuntu-latest, name: Linux, target: x86_64-unknown-linux-gnu, ext: "" }
          - { os: windows-latest, name: Windows, target: x86_64-pc-windows-msvc, ext: ".exe" }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: grim-${{ matrix.job.target }}
          path: test/bin
      - name: Prepare Binary
        shell: bash
        run: |
          mv "test/bin/grim-${{ matrix.job.target }}${{ matrix.job.ext }}" "test/bin/grim${{ matrix.job.ext }}"
          chmod +x test/bin/grim${{ matrix.job.ext }}
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Setup Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      - name: Run Acceptance Tests
        shell: bash
        run: task test -- --junit-xml=results/junit.xml
        env:
          SKIP_BUILD: "true"
      - name: Upload Test Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deep-acceptance-${{ matrix.job.name }}
          path: test/results/junit.xml

  test-results:
    name: Publish Deep Test Results
    needs: [build, cross-compile, acceptance-tests]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: deep-*
          path: artifacts
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        with:
          files: "artifacts/**/junit.xml"
          check_name: "Deep Test Results"
