name: Publish to OCX

# cargo-dist post-announce job (also manually dispatchable). After the GitHub
# Release is published, repackage the freshly built musl / darwin / windows
# archives as OCX packages and publish the multi-platform package to the
# production registry `ocx.sh/grim` under a single frozen build-timestamp, then
# push its catalog description + logo.
#
# NOT a mirror — grimoire's own release pushed to OCX. Reference:
# ocx/.github/workflows/oci-publish.yml (single-job repackage + push).
#
# One Linux runner does everything. macOS/Windows packages are built by
# cargo-dist and repacked + published here, but are NOT natively smoke-tested:
# cargo-dist cannot run a post-build step on its per-target build machines, and
# dedicated macOS/Windows test runners cost ~10x / ~2x Linux. The native
# `ocx package test` smoke therefore covers linux/amd64 (the one platform this
# runner can execute) — enough to validate the platform-independent packaging.

on:
  workflow_call:
    inputs:
      plan:
        # Forwarded by cargo-dist; required by the custom-job contract, unused here.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to (re)publish, e.g. v0.2.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # Serialize publishes per tag — never cancel a half-finished registry push.
  group: publish-ocx-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  # Pin ocx so the package commands behave exactly as validated locally.
  OCX_VERSION: "0.3.4"
  # Make the implicit registry explicit (package test uses a registry-less id).
  OCX_DEFAULT_REGISTRY: ocx.sh

jobs:
  publish:
    if: ${{ !contains(github.ref_name, '-') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: ocx.sh
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          lfs: true

      - name: Install OCX
        uses: ocx-sh/setup-ocx@0a39e58f272e7b4e2e46cfa89cdbad2a3578d2cc # v1.1.0
        with:
          version: ${{ env.OCX_VERSION }}
          project: "" # binary-only; grimoire has no ocx.toml project to activate

      - name: Resolve release tag
        id: ver
        shell: bash
        env:
          # Pass via env — never interpolate ${{ }} into the script body (blocks
          # GitHub Actions script injection from the free-form dispatch input).
          RAW_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if ! [[ "$RAW_TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag '$RAW_TAG' is not a clean release version (vX.Y.Z)"
            exit 1
          fi
          echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download release archives (musl + darwin + windows)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            -p 'grimoire-*-linux-musl.tar.xz' \
            -p 'grimoire-*-apple-darwin.tar.xz' \
            -p 'grimoire-*-pc-windows-msvc.zip' \
            -D dl --clobber

      - name: Repackage, smoke-test, and publish all platforms
        shell: bash
        env:
          OCX_AUTH_ocx_sh_USER: ${{ secrets.REGISTRY_USER }}
          OCX_AUTH_ocx_sh_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          declare -A PLATFORM_MAP=(
            [x86_64-unknown-linux-musl]=linux/amd64
            [aarch64-unknown-linux-musl]=linux/arm64
            [x86_64-apple-darwin]=darwin/amd64
            [aarch64-apple-darwin]=darwin/arm64
            [x86_64-pc-windows-msvc]=windows/amd64
            [aarch64-pc-windows-msvc]=windows/arm64
          )

          # Freeze ONE UTC build-timestamp so every platform shares the published
          # tag and collapses into a single multi-platform OCI image index.
          ts="$(date -u +%Y%m%d%H%M%S)"
          identifier="ocx.sh/grim:${VERSION}_${ts}"
          echo "publishing ${identifier}"

          # Phase 1 — repackage every platform into a bin/-layout OCX bundle;
          # natively smoke-test the one platform this Linux runner can execute.
          for target in "${!PLATFORM_MAP[@]}"; do
            platform="${PLATFORM_MAP[$target]}"
            ext=""; aext="tar.xz"
            case "$target" in *windows*) ext=".exe"; aext="zip" ;; esac
            archive="dl/grimoire-${target}.${aext}"
            if [ ! -f "$archive" ]; then echo "::error::missing $archive"; exit 1; fi

            stage="$(mktemp -d)"
            # GNU tar on linux cannot read zip; use unzip for the windows archives.
            if [ "$aext" = "zip" ]; then
              unzip -q "$archive" -d "$stage"
            else
              tar -xf "$archive" -C "$stage"
            fi
            found="$(find "$stage" -name "grim${ext}" -type f | head -1)"
            if [ -z "$found" ]; then echo "::error::no grim${ext} in $archive"; exit 1; fi

            rm -rf "repackage-${target}"
            mkdir -p "repackage-${target}/bin"
            install -m 0755 "$found" "repackage-${target}/bin/grim${ext}"
            ocx package create "repackage-${target}" \
              --metadata packaging/grim/metadata.json \
              --output "pkg-${target}.tar.xz" \
              --platform "$platform"

            if [ "$platform" = "linux/amd64" ]; then
              echo "==> native smoke test (${platform})"
              ocx package test \
                --platform "$platform" \
                --identifier "grim:${VERSION}" \
                --metadata packaging/grim/metadata.json \
                "pkg-${target}.tar.xz" \
                -- grim --version
            fi
          done

          # Phase 2 — push every platform to the one frozen tag. --cascade then
          # derives the rolling :X.Y.Z, :X.Y, :X and :latest tags users install.
          for target in "${!PLATFORM_MAP[@]}"; do
            platform="${PLATFORM_MAP[$target]}"
            echo "==> push ${identifier} (${platform})"
            ocx package push \
              --identifier "$identifier" \
              --platform "$platform" \
              --cascade \
              --new \
              --metadata packaging/grim/metadata.json \
              "pkg-${target}.tar.xz"
          done

      - name: Push catalog description + logo
        shell: bash
        env:
          OCX_AUTH_ocx_sh_USER: ${{ secrets.REGISTRY_USER }}
          OCX_AUTH_ocx_sh_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          ocx package describe ocx.sh/grim \
            --readme CATALOG.md \
            --logo assets/logo.png \
            --title "Grimoire" \
            --description "OCI-backed package manager for AI skills and rules" \
            --keywords "grimoire,grim,ai,skills,rules,oci,package-manager,rust"
