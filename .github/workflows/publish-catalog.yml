name: Publish Catalog

# Publish first-party catalog packages (catalog/) to GHCR with the released
# grim binary — dogfooding `grim publish` end to end — and announce them to
# the public package index (grimoire-rs/index) via `--announce`, the same
# contributor path anyone else uses.
#
# Two triggers:
# - workflow_dispatch: humans publish on demand (version bumps via PR).
# - workflow_call: cargo-dist post-announce job — every grim release
#   republishes the catalog with the freshly released binary. Idempotent:
#   unchanged versions re-push the same digest (a no-op); changed content
#   without a publish.toml bump fails loudly (bump discipline).
#
# Versions come from catalog/publish.toml; grim publish releases
# skills/rules/agents before bundles so bundle members always resolve.
#
# Announce needs a cross-repo credential: GITHUB_TOKEN is repo-scoped, so
# the PR against grimoire-rs/index uses the INDEX_ANNOUNCE_TOKEN secret
# (fine-grained PAT: contents + pull-requests write on grimoire-rs/index).
# When the secret is absent the announce step is skipped with a notice —
# publishing itself still succeeds.
#
# Cost: one Linux job, ~2-3 min (released binary download, no Rust build).

on:
  workflow_call:
    inputs:
      plan:
        # Forwarded by cargo-dist; required by the custom-job contract, unused here.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      dry_run:
        description: Plan only — validate + pack, no push
        type: boolean
        default: false
      force:
        description: Move existing exact-version tags
        type: boolean
        default: false
      grim_version:
        description: grim release tag to publish with (latest or vX.Y.Z)
        type: string
        default: latest

permissions:
  contents: read
  packages: write

concurrency:
  # Serialize publishes — never cancel a half-finished registry push.
  group: publish-catalog
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Per-job credential store; never the runner's shared docker config.
      # Set via GITHUB_ENV: the `runner` context is not available in
      # job-level `env`, only at step level — a job-level `${{ runner.temp }}`
      # fails workflow parsing and startup-fails every push.
      - name: Isolate Docker config
        run: echo "DOCKER_CONFIG=${RUNNER_TEMP}/docker" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0

      - name: Install released grim
        shell: bash
        env:
          # Pass via env — never interpolate ${{ }} into the script body
          # (blocks script injection from the free-form dispatch input).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRIM_VERSION: ${{ inputs.grim_version }}
        run: |
          set -euo pipefail
          # workflow_call provides no grim_version input — default to latest
          # (the release that just triggered the post-announce job).
          GRIM_VERSION="${GRIM_VERSION:-latest}"
          if [[ "$GRIM_VERSION" != "latest" && ! "$GRIM_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::grim_version '$GRIM_VERSION' must be 'latest' or vX.Y.Z"
            exit 1
          fi
          args=()
          if [[ "$GRIM_VERSION" != "latest" ]]; then
            args+=("$GRIM_VERSION")
          fi
          gh release download "${args[@]}" --repo "$GITHUB_REPOSITORY" \
            -p 'grimoire-x86_64-unknown-linux-musl.tar.xz' -D dl
          stage="$(mktemp -d)"
          tar -xf dl/grimoire-x86_64-unknown-linux-musl.tar.xz -C "$stage"
          found="$(find "$stage" -name grim -type f | head -1)"
          if [[ -z "$found" ]]; then
            echo "::error::no grim binary in release archive"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/bin"
          install -m 0755 "$found" "$RUNNER_TEMP/bin/grim"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/grim" --version

      - name: grim login
        env:
          # env intermediary — never ${{ }} secrets in the script body.
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$REGISTRY_TOKEN" | grim login "$REGISTRY" -u "$REGISTRY_USER" \
            --password-stdin --allow-insecure-store

      - name: Dry-run smoke
        # Always runs: full validate + pack + plan against the live
        # registry with zero writes, gating the real push below.
        env:
          SKIP_BUILD: "true"
          GRIM_COMMAND: grim
        run: task catalog:release -- --dry-run

      - name: Publish
        if: ${{ !inputs.dry_run }}
        env:
          SKIP_BUILD: "true"
          GRIM_COMMAND: grim
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          args=()
          if [[ "$FORCE" == "true" ]]; then
            args+=(--force)
          fi
          task catalog:release -- "${args[@]}"

      - name: Announce to index
        if: ${{ !inputs.dry_run }}
        env:
          # Cross-repo PAT (grimoire-rs/index: contents + pull-requests
          # write). gh consumes GH_TOKEN; `gh auth setup-git` wires the
          # same token into git pushes for the announce clone.
          GH_TOKEN: ${{ secrets.INDEX_ANNOUNCE_TOKEN }}
          SKIP_BUILD: "true"
          GRIM_COMMAND: grim
        run: |
          set -euo pipefail
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::notice::INDEX_ANNOUNCE_TOKEN not set — skipping index announce"
            exit 0
          fi
          gh auth setup-git
          task catalog:release -- --announce

      - name: grim logout
        if: always()
        # Cleanup glue: tolerate a missing binary when an early step failed;
        # logout itself is idempotent by design.
        run: command -v grim >/dev/null 2>&1 && grim logout "$REGISTRY" || true
