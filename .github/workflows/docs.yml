name: Docs

# Build the mdBook documentation site and publish it to GitHub Pages.
#
# The JSON Schemas served at /schemas/ are generated from grim's parse
# structs at build time (never committed), so this workflow must rebuild
# whenever those structs — or anything they pull in — change. That is why
# `src/**` and the Cargo manifests are in the path filter alongside `docs/`.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'taskfiles/docs.taskfile.yml'
      - 'taskfiles/schema.taskfile.yml'
      - 'taskfiles/rust.taskfile.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # `external/docker_credential` is the [patch.crates-io] source; the
          # grim build (needed to generate the schemas) fails without it.
          submodules: recursive
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          matcher: true
      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Setup Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      - name: Install mdBook
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: mdbook
      # Builds grim, regenerates docs/src/schemas/*.json from the parser,
      # then builds the book — so the published schemas always match grim.
      - name: Build the book
        run: task docs:build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
