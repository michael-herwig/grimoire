# A ready-made consumer project for the manual rig.
#
#   cd test/manual/project
#   grim lock && grim install && grim status
#
# The skill/rule entries use the FLOATING major tag `:1`, so after the
# bootstrap script publishes a 1.1.0 of `code-reviewer`, `grim update`
# rolls the pin forward from 1.0.0 → 1.1.0 (rolling release).
[options]
default_registry = "localhost:5050"
editor = "claude"

[skills]
hello-world   = "localhost:5050/grimoire/skills/hello-world:1"
code-reviewer = "localhost:5050/grimoire/skills/code-reviewer:1"
commit-helper = "localhost:5050/grimoire/skills/commit-helper:1"

[rules]
rust-style         = "localhost:5050/grimoire/rules/rust-style:1"
security-baseline  = "localhost:5050/grimoire/rules/security-baseline:1"
# A multi-file rule (index + support dir): install materializes
# .claude/rules/architecture-guide.md AND .claude/rules/architecture-guide/.
# Edit a file under that dir to see `grim status` report it as `modified`.
architecture-guide = "localhost:5050/grimoire/rules/architecture-guide:1"
