# A bundle for the manual rig: groups a few catalog members so `grim search`
# / `grim tui` show a bundle entry carrying its own catalog metadata. This is
# the bundle's v1 (1.0.0) member set; the published bundle name is the .toml
# file stem (src/command/build.rs::read_bundle_members).
#
# v2 (starter-pack-v2.toml) intentionally ADDS commit-helper and DROPS
# security-baseline so `grim add bundle starter-pack ...:1` vs `...:2`
# exercises a bundle whose newer version adds AND removes members.
#
# Members reference the rig's fixed registry (localhost:5050) on the floating
# major tag, exactly as the consumer project declares them.
summary = "Curated starter pack"
keywords = "starter,review,style,security"
description = "A starter set: the code-review skill plus the Rust and security rules"
repository = "https://github.com/grimoire-samples/starter-pack"

[skills]
code-reviewer = "localhost:5050/grimoire/skills/code-reviewer:1"

[rules]
rust-style = "localhost:5050/grimoire/rules/rust-style:1"
security-baseline = "localhost:5050/grimoire/rules/security-baseline:1"
