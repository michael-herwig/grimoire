[package]
name = "grimoire"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "An OCI-backed package manager for AI skills and rules"
repository = "https://github.com/michael-herwig/grimoire"
default-run = "grim"

[[bin]]
name = "grim"
path = "src/main.rs"

[dependencies]
clap = { version = ">=4.5.57, <5", features = ["derive", "color"] }
clap_complete = "4.6.2"
anyhow = "1.0.101"
tokio = { version = "1", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = [
    "env-filter",
    "std",
    "fmt",
    "json",
    "registry",
] }
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2"

[dev-dependencies]
serde_json = "1"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"

[lints.clippy]
# Crate-wide clippy overrides go here. Kept explicit so scope is clear.
