# Publish manifest for first-party catalog packages.
#
# NOT a grim bundle — this file drives `grim publish`.
# Versions are independent per package and bumped via PR (no git tags;
# cliff.toml's unanchored tag_pattern would pick catalog tags up).
#
# Bump rules: patch = content fix; minor = new sections/reference files;
# major = restructure or renamed reference files.

registry = "grim.ocx.sh"

[skills.grim-usage]
version = "0.4.0"

[skills.ai-config-authoring]
version = "0.1.0"

[skills.grim-authoring]
version = "0.2.0"

[bundles.grim-essentials]
version = "0.1.0"
