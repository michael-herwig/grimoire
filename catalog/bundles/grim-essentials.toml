# First-party starter bundle: install all three grim knowledge skills at once.
#
#   grim add --kind bundle ghcr.io/grimoire-rs/bundles/grim-essentials:0
#
# Members reference the floating major tag (:0 for the 0.x line) so skill
# patch releases reach consumers via cascade tags + `grim update` without
# a bundle re-release. Published without --pin for the same reason.

summary = "Grimoire first-party starter pack"
keywords = "grimoire,grim,skills,authoring,ai-config,oci,starter"
description = "First-party skills: using the grim CLI, vendor-neutral AI-config authoring craft, and grim artifact authoring"
repository = "https://github.com/grimoire-rs/grimoire"

[skills]
grim-usage = "ghcr.io/grimoire-rs/skills/grim-usage:0"
ai-config-authoring = "ghcr.io/grimoire-rs/skills/ai-config-authoring:0"
grim-authoring = "ghcr.io/grimoire-rs/skills/grim-authoring:0"
